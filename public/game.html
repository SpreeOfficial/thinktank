<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkTank - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="gameContainer">
        <h1>🃏 ThinkTank</h1>
        <div id="timer"></div>
        <div id="phaseLabel" class="phase-label"></div>
        <div id="roundLabel" class="center"></div>
        <div id="sentence" class="sentence-display" style="display:none;"></div>
        <div id="selectedPreview" class="selected-preview"></div>
        <div id="hand" class="hand"></div>
        <div id="submitArea" class="center" style="display:none;">
            <button id="submitBtn" onclick="submitCards()" disabled>Submit Answer</button>
        </div>
        <div id="voting" style="display:none;"></div>
        <div id="results" style="display:none;"></div>
        <div id="scoreboard" class="scoreboard"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="socket.js"></script>
    <script src="game.js"></script>
</body>
</html>

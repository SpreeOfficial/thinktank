<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkTank - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Leave confirmation modal -->
<div id="leaveModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h2 style="color:#d19e18; margin-bottom:12px;">😢 Sad to see you go!</h2>
        <p style="color:#aaa; margin-bottom:20px;">Are you sure you wanna miss the fun?</p>
        <div class="modal-buttons">
            <button class="btn-danger" onclick="confirmLeave()">Yes, Let me out!</button>
            <button class="btn-stay" onclick="cancelLeave()">No, I'm stayin for the fun!</button>
        </div>
    </div>
</div>

<div class="game-wrapper">
    <!-- LEFT SIDEBAR: Players / Scoreboard -->
    <aside class="game-sidebar" id="sidebar">
        <h3 class="sidebar-title">Players</h3>
        <ul class="sidebar-players" id="sidebarPlayers"></ul>
        <div class="sidebar-leave">
            <button class="btn-leave" onclick="showLeaveModal()">I'm leaving, bye! 👋</button>
        </div>
    </aside>

    <!-- MAIN GAME AREA -->
    <div class="game-main">
        <div class="game-header">
            <img class="logo-small" src="../media/thinktank-transparent-blue.png"/>
            <div class="game-header-info">
                <div id="roundLabel" class="round-badge"></div>
                <div id="timer" class="game-timer"></div>
            </div>
        </div>
        <div id="phaseLabel" class="phase-label"></div>

        <!-- PLAY PHASE -->
        <div id="playArea">
            <div id="sentence" class="sentence-display" style="display:none;"></div>
            <div id="hand" class="hand"></div>
            <div id="submitArea" class="center" style="display:none;">
                <button id="submitBtn" onclick="submitCards()" disabled>
                    <span id="submitBtnText">I'm Ready!</span>
                </button>
            </div>
        </div>

        <!-- VOTE PHASE -->
        <div id="voting" style="display:none;"></div>

        <!-- RESULTS PHASE -->
        <div id="results" style="display:none;"></div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="socket.js"></script>
<script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkTank - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-wrapper">
    <!-- LEFT SIDEBAR: Players / Scoreboard -->
    <aside class="game-sidebar" id="sidebar">
        <h3 class="sidebar-title">Players</h3>
        <ul class="sidebar-players" id="sidebarPlayers"></ul>
    </aside>

    <!-- MAIN GAME AREA -->
    <div class="game-main">
        <div class="game-header">
            <img class="logo-small" src="../media/thinktank-transparent-blue.png"/>
            <div class="game-header-info">
                <div id="roundLabel" class="round-badge"></div>
                <div id="timer" class="game-timer"></div>
            </div>
        </div>
        <div id="phaseLabel" class="phase-label"></div>

        <!-- PLAY PHASE -->
        <div id="playArea">
            <div id="sentence" class="sentence-display" style="display:none;"></div>
            <div id="hand" class="hand"></div>
            <div id="submitArea" class="center" style="display:none;">
                <button id="submitBtn" onclick="submitCards()" disabled>
                    <span id="submitBtnText">I'm Ready!</span>
                </button>
            </div>
        </div>

        <!-- VOTE PHASE -->
        <div id="voting" style="display:none;"></div>

        <!-- RESULTS PHASE -->
        <div id="results" style="display:none;"></div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="socket.js"></script>
<script src="game.js"></script>
</body>
</html>

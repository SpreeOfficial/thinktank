<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Game</title>
</head>
<body>

  <h1>Card Game</h1>

  <button onclick="create()">Create Lobby</button>

  <p id="status"></p>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Listen ONCE (vigtigt)
    socket.on("lobbyCreated", (id) => {
      window.location = `/lobby.html?lobby=${id}`;
    });

    function create() {
      document.getElementById("status").innerText = "Creating lobby...";
      socket.emit("createLobby");
    }
  </script>

</body>
</html>

<script src="/socket.io/socket.io.js"></script>
<script src="socket.js"></script>
<script src="lobby.js"></script>
<script src="game.js"></script>
